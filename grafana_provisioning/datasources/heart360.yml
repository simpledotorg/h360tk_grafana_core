# ./provisioning/datasources/postgres-db.yml
apiVersion: 1

datasources:
  - name: Hypertension Data (PostgreSQL)
    uid: postgres-hypertension
    type: postgres
    url: postgres:5432
    user: heart360tk
    access: proxy
    isDefault: false 
    version: 4
    editable: true
    jsonData:
      # Host is the Docker service name, port is the default 5432
      host: 
      port: 5432
      database: heart360tk_database
      # Use a secure connection if needed, but 'disable' is common for Docker environments
      sslmode: disable
      searchPath: heart360tk_schema,public
      # Postgres plugin requires this for time series
      timescaledb: false
      maxOpenConns: 100
      maxIdleConns: 2
      maxIdleConnsLifetime: 14400
      pool: false
      # Settings for the time column and schema visibility
      timeseries: true
      timeInterval: 
      intVal: true
    secureJsonData:
      # Password must be stored securely
      password: YmE4ZTk0OGI0OTNmNGU5YmFjZDY1YTA0

  - name: Hypertension Data Cached (PostgreSQL)
    uid: postgres-hypertension-cached
    type: postgres
    url: postgres:5432
    user: heart360tk_cached
    access: proxy
    isDefault: false
    version: 4
    editable: true
    jsonData:
      # Use the reporting schema first so unqualified dashboard queries resolve to matviews.
      host:
      port: 5432
      database: heart360tk_database
      sslmode: disable
      searchPath: heart360tk_reporting,heart360tk_schema,public
      timescaledb: false
      maxOpenConns: 100
      maxIdleConns: 2
      maxIdleConnsLifetime: 14400
      pool: false
      timeseries: true
      timeInterval:
      intVal: true
    secureJsonData:
      password: Y2FjaGVkX3JlYWRvbmx5X3VzZXI=