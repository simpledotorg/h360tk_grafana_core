# ./provisioning/dashboards/dashboard_provider.yml
apiVersion: 1

providers:
  - name: 'HEARTS360 Dashboards'
    orgId: 1
    folder: 'Dashboards'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /etc/grafana/provisioning/dashboards/Dashboards
      foldersFromFilesStructure: false


  - name: 'Admin Dashboards'
    orgId: 1
    folder: 'Admin'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /etc/grafana/provisioning/dashboards_admin
      foldersFromFilesStructure: false
